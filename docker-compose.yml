services:
  redis:
    image: redis:alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROD: ${PROD:-true}
    ports:
      - "${PORT:-8000}:8000"
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
      MAX_SESSIONS: 50
      EVICT_ON_GET: "true"
    depends_on: [redis]
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 12
    restart: unless-stopped
    command: >
      bash -lc 'if [ "${PROD:-true}" = "false" ]; then
        uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload;
      else
        uvicorn backend.app:app --host 0.0.0.0 --port 8000;
      fi'

  godot-cs-build:
    build:
      context: ./clients/godot_csharp
      dockerfile: Dockerfile.build
      args:
        GODOT_VER: "4.4.1"
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Toggle editor vs build/export:
      GODOT_EDITOR: ${GODOT_EDITOR:-false}
      # What the EXPORTED binary should use by default on your host:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      # Let the editor draw windows on your host (X11):
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      # export outputs
      - ./dist/godot_csharp:/out
      # your project code
      - ./clients/godot_csharp:/game
      # X11 socket for GUI when editor is enabled
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      # persist the downloaded editor + export templates (optional)
      - godot-sdk:/opt/Godot_v4.4.1-stable_mono_linux_x86_64
      - godot-templates:/root/.local/share/godot/export_templates/4.4.1.stable.mono
    working_dir: /game
    # keep ENTRYPOINT from the image; it will read GODOT_EDITOR and act
    command: ""

volumes:
  godot-sdk:
  godot-templates:
